services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickfix-api
    env_file:
      - .env
    environment:
      - PORT=3000
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config/:/app/config
      - ./src:/app/src
      - ./prisma:/app/prisma
    networks:
      - quickfix-network

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=${PG_DATABASE}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_USER=${PG_USER:-postgres}
    container_name: quickfix-db
    volumes:
      - quickfix-db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - quickfix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  quickfix-db-data:

networks:
  quickfix-network:
    driver: bridge
